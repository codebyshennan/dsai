title: Data Science and AI Course
description: A comprehensive curriculum covering data fundamentals, data wrangling, visualization, statistical analysis, and machine learning fundamentals
baseurl: "/tamkeen-data"
url: "https://codebyshennan.github.io"

# Repository information
repository: codebyshennan/tamkeen-data
github:
  repository_url: https://github.com/codebyshennan/tamkeen-data

# Build settings
# Use CommonMarkGhPages explicitly (same libcmark-gfm stack as `markdown: GFM`).
# The github-pages gem maps `GFM` → CommonMarkGhPages and injects the `tagfilter`
# extension, which escapes <iframe> (YouTube embeds) to literal text. Omit
# tagfilter so embedded videos render; keep tables / strikethrough / autolink.
markdown: CommonMarkGhPages
commonmark:
  options:
    - UNSAFE
    - FOOTNOTES
  extensions:
    - table
    - strikethrough
    - autolink
# Theme via gem (see `theme:` below); do not use `remote_theme` here — it downloads from
# GitHub at build time and can fail on flaky networks or SSL issues. Gem matches Pages.
# Keep in sync with GitHub Pages defaults (see Gemfile / https://pages.github.com/versions/)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata
  # Shipped with github-pages gem; listed here so plain `jekyll build` matches Pages:
  - jekyll-relative-links      # [text](other.md) -> .html in output
  - jekyll-optional-front-matter  # process lesson .md without --- YAML blocks
  - jekyll-default-layout      # apply default layout to those pages

# Error handling
liquid:
  error_mode: warn
  strict_variables: false
  strict_filters: false

# Collections
collections:
  docs:
    output: true
    permalink: /:collection/:path

# Default front matter
defaults:
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

theme: jekyll-theme-primer

# Include directories
include:
  - .assets

# Exclude from processing
exclude:
  - .git/
  - .gitbook/
  - .gitignore
  - node_modules/
  # Removed 0-prep/ and 1-data-fundamentals/ to include in site build
  # - 0-prep/
  # - 1-data-fundamentals/
  # - docs/0-prep/
  # - docs/1-data-fundamentals/
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .sass-cache/
  - .jekyll-cache/
  - .jekyll-metadata
  # Exclude internal documentation (see meta/README.md)
  - meta/
  - "**/ENHANCEMENTS-SUMMARY.md"
  - "**/REVIEW-ENHANCEMENTS.md"
  - CLAUDE.md
  - slides/README.md

# GitHub Pages settings
lsi: false
safe: true
incremental: false
highlighter: rouge
gist:
  noscript: false
# Code highlighting: global Rouge (GFM fenced blocks use ` ```python ` etc. for language).
# Math: layout loads KaTeX (auto-render); use $$...$$, \\[...\\], \\(...\\) in Markdown.
# Optional privacy-friendly analytics (set to your Plausible site domain, or leave blank):
# plausible_domain: your-site-id
