<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.3.1/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.3.1/dist/theme/white.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .reveal {
            font-size: 1.45em;
        }

        /* Dense slides: smaller type so more bullets fit without overflow */
        .reveal .box.box--compact {
            font-size: 0.88em;
            max-width: 92%;
        }

        .reveal .box.box--compact h3 {
            font-size: 1.15em;
        }

        .reveal .box.box--compact li {
            margin-bottom: 0.35em;
            line-height: 1.35;
        }

        .reveal h1,
        .reveal h2,
        .reveal h3 {
            text-transform: none;
            margin-bottom: 0.5em;
            text-align: center;
        }

        .reveal h1 {
            font-size: 2em;
        }

        .reveal h2 {
            font-size: 1.6em;
        }

        .reveal h3 {
            font-size: 1.3em;
        }

        .reveal p {
            margin-bottom: 1em;
            line-height: 1.4;
            text-align: center;
        }

        .reveal ul {
            margin: 0 auto;
            text-align: left;
            max-width: 80%;
        }

        .reveal li {
            margin-bottom: 0.5em;
            overflow-wrap: anywhere;
            word-wrap: break-word;
        }

        .reveal code {
            padding: 0.2em 0.4em;
            border-radius: 4px;
        }

        .reveal pre {
            padding: 1em;
            border-radius: 8px;
            max-width: 80%;
            margin: 0 auto;
        }

        .reveal .slides {
            text-align: center;
        }

        .reveal .center {
            text-align: center;
        }

        .reveal .right {
            text-align: right;
        }

        .reveal .box {
            padding: 1em;
            border-radius: 8px;
            margin: 1em auto;
            max-width: 88%;
        }

        .reveal .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25em 2em;
            max-width: 92%;
            margin: 0 auto;
            align-items: start;
        }

        .reveal .three-column {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1em 1.25em;
            max-width: 96%;
            margin: 0 auto;
            align-items: start;
        }

        .reveal .two-column .list-container,
        .reveal .three-column .list-container {
            max-width: 100%;
        }

        .reveal .two-column ul,
        .reveal .two-column ol,
        .reveal .three-column ul,
        .reveal .three-column ol {
            max-width: 100%;
        }

        .slide-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            font-size: 0.78em;
            color: #555;
            z-index: 2000;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(4px);
            padding: 0.4em 1em;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 0.75em;
        }

        .slide-nav a {
            color: #555;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.3em;
            padding: 0.2em 0.5em;
            border-radius: 4px;
            transition: background 0.15s;
        }

        .slide-nav a:hover {
            background: rgba(0,0,0,0.07);
            color: #222;
        }

        .slide-nav__title {
            flex: 1;
            text-align: center;
            font-weight: 500;
            color: #444;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .slide-nav__btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #555;
            font-size: 1em;
            display: inline-flex;
            align-items: center;
            gap: 0.3em;
            padding: 0.2em 0.5em;
            border-radius: 4px;
            transition: background 0.15s;
        }

        .slide-nav__btn:hover {
            background: rgba(0,0,0,0.07);
            color: #222;
        }

        .slide-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            font-size: 0.8em;
            color: #666;
            z-index: 1000;
            background: white;
            padding: 0.5em 1em;
            border-top: 1px solid #eee;
            text-align: left;
        }

        section {
            padding: 2em;
            padding-top: 3.5em;
            padding-bottom: 4em;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .list-container {
            width: 100%;
            max-width: 80%;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <nav class="slide-nav" id="slide-nav">
        <a href="../" title="Back to lesson">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Back
        </a>
        <span class="slide-nav__title">{{title}}</span>
        <button class="slide-nav__btn" id="fs-btn" title="Toggle fullscreen" onclick="toggleFullscreen()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" id="fs-icon"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
    </nav>
    <div class="reveal">
        <div class="slides">
            {{content}}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.3.1/dist/reveal.js"></script>
    <script>
        Reveal.initialize({
            hash: true,
            center: false,
            transition: 'slide',
            slideNumber: true,
            plugins: []
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Swap fullscreen icon when state changes
        document.addEventListener('fullscreenchange', function () {
            var icon = document.getElementById('fs-icon');
            if (document.fullscreenElement) {
                icon.innerHTML = '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>';
            } else {
                icon.innerHTML = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
            }
        });
    </script>
</body>

</html>
